<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Become a Professional</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-group label {
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        .section-title {
            grid-column: 1 / -1;
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            color: var(--primary-color);
        }
        #messageBox {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success-msg { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error-msg { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">ServiceFinder</a>
    <nav class="nav-links">
        <a href="/login">Login</a>
        <a href="/" class="btn-primary">Back to Home</a>
    </nav>
</header>

<div class="form-container">
    <h2>Register as a Service Provider</h2>
    <p>Step 1: Create your professional account.</p>

    <form id="providerSignUpForm">
        <div class="form-grid">

            <h3 class="section-title">Personal Details</h3>

            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" required>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="cellPhone">Cell Phone</label>
                <input type="text" id="cellPhone" required>
            </div>

            <div class="form-group full-width">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>

            <h3 class="section-title">Primary Address</h3>

            <div class="form-group full-width">
                <label for="addressLine1">Address Line 1</label>
                <input type="text" id="addressLine1" required>
            </div>

            <div class="form-group full-width">
                <label for="addressLine2">Address Line 2 (Optional)</label>
                <input type="text" id="addressLine2">
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" required>
            </div>

            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" required>
            </div>

            <div class="form-group">
                <label for="zipCode">Zip Code</label>
                <input type="text" id="zipCode" required>
            </div>

            <div class="form-group">
                <label for="addressType">Address Type</label>
                <select id="addressType" required>
                    <option value="Home">Home</option>
                    <option value="Office">Office</option>
                    <option value="Shop">Shop/Storefront</option>
                </select>
            </div>

            <div class="form-group full-width">
                <button type="submit" class="search-btn" style="width: 100%; margin-top: 15px;" id="submitBtn">Sign Up as Provider</button>
            </div>
        </div>
    </form>

    <div id="messageBox"></div>
</div>

<script th:src="@{/js/provider-signup.js}"></script>
</body>
</html>
